<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Price Checker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>Want to know more about your product?</h1>

    <label>Item name (optional)</label>
    <input id="itemName" type="text" placeholder="e.g. Jif Peanut Butter" />

    <label>Barcode (UPC)</label>
    <input id="barcode" type="text" placeholder="Scan or type barcode" />

   

    <button id="startScannerBtn">Open Camera & Scan</button>
    <button id="stopScannerBtn" style="display:none;">Stop Scanner</button>

    <div id="scanner-container">
      <div id="scanner"></div>
      <p id="scannerStatus"></p>
    </div>

    <button id="checkBtn" class="primary">Check Info</button>

    <p id="status"></p>
    <pre id="result"></pre>
  </div>

  <script src="https://unpkg.com/quagga@0.12.1/dist/quagga.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
